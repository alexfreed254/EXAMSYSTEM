{% extends "base.html" %}
{% block title %}{{ 'Edit' if dept else 'Add' }} Department - TTTI{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="fas fa-building me-2 text-primary"></i>{{ 'Edit' if dept else 'Add' }} Department</h4>
</div>
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Department Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" value="{{ dept.name if dept else '' }}" required placeholder="e.g., Electrical Engineering Department">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Department Code <span class="text-danger">*</span></label>
                        <input type="text" name="code" class="form-control" value="{{ dept.code if dept else '' }}" required placeholder="e.g., EE" style="text-transform:uppercase">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Head of Department</label>
                        <input type="text" name="head_of_department" class="form-control" value="{{ dept.head_of_department if dept else '' }}" placeholder="Full name of HOD">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Brief description of the department">{{ dept.description if dept else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>{{ 'Update' if dept else 'Save' }} Department
                        </button>
                        <a href="{{ url_for('admin.departments') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
