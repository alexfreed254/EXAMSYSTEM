services:
  - type: web
    name: ttti-erms
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: ttti-super-secret-2025-xK9mP3qR7nZ
      - key: DATABASE_URL
        sync: false   # Set this manually in Render dashboard from Supabase
      - key: PYTHON_VERSION
        value: 3.11.0
