services:
  - type: web
    name: ttti-erms
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ttti-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: ttti-db
    databaseName: ttti_erms
    user: ttti_user
    plan: free
    region: oregon
