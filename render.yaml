services:
  - type: web
    name: ttti-erms
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false        # Set manually in Render dashboard
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false        # Set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false        # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
